name: Build & Deploy

# Every push to `deploy` ships to the Azure VM. Use the Actions tab
# ("Run workflow") for a manual redeploy without a code change.
on:
  push:
    branches: [deploy]
  workflow_dispatch:

env:
  # GHCR requires an all-lowercase path. Repo is Tifym7/AquaGraph.
  IMAGE: ghcr.io/tifym7/aquagraph

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # lets GITHUB_TOKEN push to GHCR for this repo
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # :latest for humans, :<sha> so the VM deploys an exact, rollback-able build.
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          # Pass the values the remote script needs.
          envs: GHCR_PAT,GIT_SHA
          script: |
            set -euo pipefail
            cd "$HOME/AquaGraph"

            # Sync compose + db init scripts (the app image is pulled, but
            # docker-compose.prod.yml and backend/db.sql live in the checkout).
            git fetch origin deploy
            git reset --hard origin/deploy

            # Authenticate to pull the PRIVATE image (Option A: PAT on VM).
            echo "$GHCR_PAT" | docker login ghcr.io \
              -u "${{ secrets.VM_GHCR_USER }}" --password-stdin

            # Deploy the exact build from this run (deterministic + rollback-able).
            export IMAGE="ghcr.io/tifym7/aquagraph:${GIT_SHA}"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GIT_SHA: ${{ github.sha }}
