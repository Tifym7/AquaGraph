# Bring the whole stack up with: `docker compose up --build`
#
# - `db`  : PostgreSQL 16. On first start, runs the schema/seed script in
#           backend/db (CREATE DATABASE line is stripped - postgres has
#           already created the DB named in POSTGRES_DB).
# - `app` : single image running the Flask backend (5000) + Vite dev
#           server (5173). The frontend points at http://localhost:5000/api,
#           so both ports are published to the host.
# - `ingest` : (profile "ingest") the satellite-pass scheduler. Start it with
#           GEE_KEY_FILE=/abs/path/to/aquagraph-gee-key.json \
#             docker compose --profile ingest up -d --build ingest

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aquagraph
    volumes:
      - aquagraph-pgdata:/var/lib/postgresql/data
      - ./backend/db.sql:/aquagraph-db.sql:ro
      - ./docker/init-aquagraph-db.sh:/docker-entrypoint-initdb.d/init-aquagraph-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d aquagraph"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_URL: postgresql://db:5432/aquagraph
      DB_USER: user
      DB_PASSWORD: password
      SECRET_KEY: change-me-in-production
      TOKEN_EXPIRY_HOURS: "24"
      # --- Advanced segment report (all optional, degrades gracefully) ---
      # Earth Engine: enables live Sentinel imagery in the technical PDF.
      # Key file is mounted as a Docker secret (see `secrets:` at the
      # bottom + `GEE_KEY_FILE` env override). If the host file is
      # missing the secret simply isn't mounted and EE init returns
      # cleanly without crashing the worker.
      GEE_SERVICE_ACCOUNT_KEY: /run/secrets/gee_service_account_key
      GEE_PROJECT: ${GEE_PROJECT:-cassini2026}
      # Ollama: enables the multimodal AI synthesis section. Empty URL
      # disables it; the report still ships with imagery + charts.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL:    ${OLLAMA_MODEL:-llava}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-120}
      # SMTP via Resend. The actual API key is mounted as a Docker secret
      # (see the `secrets:` block at the bottom + `RESEND_KEY_FILE` env
      # var to override the host path). The app reads SMTP_PASSWORD_FILE
      # first; falls back to SMTP_PASSWORD if you want to pass it inline.
      # Override SMTP_HOST/PORT/USERNAME if pointing at a different relay.
      SMTP_HOST:          ${SMTP_HOST:-smtp.resend.com}
      SMTP_PORT:          ${SMTP_PORT:-587}
      SMTP_USERNAME:      ${SMTP_USERNAME:-resend}
      SMTP_PASSWORD:      ${SMTP_PASSWORD:-}
      SMTP_PASSWORD_FILE: /run/secrets/resend_api_key
      SMTP_FROM_EMAIL:    ${SMTP_FROM_EMAIL:-noreply@aquagraph.org}
      SMTP_USE_TLS:       ${SMTP_USE_TLS:-true}
    ports:
      - "5000:5000"
      - "5173:5173"
    secrets:
      - resend_api_key
      - gee_service_account_key

  # Satellite-pass ingestion scheduler. Opt-in (profile) so `docker compose
  # up` for app dev does NOT start it. Writes history to the same Postgres
  # the app reads; the DB-backed timeline/charts/PDF update live.
  ingest:
    profiles: ["ingest"]
    build:
      context: .
      dockerfile: docker/Dockerfile.ingest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Worker connects with credentials embedded in the URL (ingest/db.py
      # uses psycopg2.connect(DB_URL) directly).
      DB_URL: postgresql://user:password@db:5432/aquagraph
      GEE_SERVICE_ACCOUNT_KEY: /secrets/gee-key.json
      GEE_PROJECT: ${GEE_PROJECT:-cassini2026}
      GEE_ASSET_RIVERS: ${GEE_ASSET_RIVERS:-projects/cassini2026/assets/eu-hydro}
      INGEST_SENSORS: ${INGEST_SENSORS:-S2,S1}
      INGEST_SCHEDULE_CRON: ${INGEST_SCHEDULE_CRON:-0 3 * * *}
      INGEST_FETCH_CHUNK: ${INGEST_FETCH_CHUNK:-250}
      INGEST_S1_BASELINE_START: ${INGEST_S1_BASELINE_START:-2023-06-01}
      INGEST_S1_BASELINE_END: ${INGEST_S1_BASELINE_END:-2023-08-31}
      INGEST_REBUILD_SNAPSHOT: ${INGEST_REBUILD_SNAPSHOT:-0}
    volumes:
      # Service-account key, mounted read-only. Set GEE_KEY_FILE to its
      # absolute host path (never commit the key).
      - ${GEE_KEY_FILE:-./aquagraph-gee-key.json}:/secrets/gee-key.json:ro

volumes:
  aquagraph-pgdata:

# Secrets are bind-mounted read-only into the containers that list them
# under `secrets:`. The host files live OUTSIDE the repo (never commit
# them). Override the *_FILE env vars to point at different host paths
# on prod, or leave the defaults for local dev.
secrets:
  resend_api_key:
    file: ${RESEND_KEY_FILE:-/home/dlese/work/deploy/resend_key}
  gee_service_account_key:
    file: ${GEE_KEY_FILE:-/home/dlese/aquagraph-gee-key.json}
