# Production stack for the Azure VM. Unlike docker-compose.yml (which BUILDS
# the app locally for development), this PULLS the prebuilt image that CI
# pushed to GHCR, and reads all secrets from a local `.env` file.
#
# Usage on the VM:
#   docker login ghcr.io -u <user> -p <ghcr-pat>   # one-time (private image)
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# The db init scripts (./backend/db.sql, ./docker/init-aquagraph-db.sh) are
# read from the repo checkout on the VM, so the VM needs `git clone` of this
# repo even though the app image itself is pulled from the registry.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: aquagraph
    volumes:
      - aquagraph-pgdata:/var/lib/postgresql/data
      - ./backend/db.sql:/aquagraph-db.sql:ro
      - ./docker/init-aquagraph-db.sh:/docker-entrypoint-initdb.d/init-aquagraph-db.sh:ro
    # Not published to the host - only the app container reaches it over the
    # compose network. Keeps Postgres off the public internet.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d aquagraph"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: ${IMAGE:-ghcr.io/tifym7/aquagraph:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_URL: postgresql://db:5432/aquagraph
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      TOKEN_EXPIRY_HOURS: "24"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      # --- Advanced segment report (all optional, degrades gracefully) ---
      # Earth Engine: enables live Sentinel imagery in the technical PDF.
      # The key file is mounted as a Docker secret; if the host file is
      # missing the secret simply isn't there and EE init returns cleanly
      # without crashing the worker.
      GEE_SERVICE_ACCOUNT_KEY: /run/secrets/gee_service_account_key
      GEE_PROJECT: ${GEE_PROJECT:-cassini2026}
      # Ollama: multimodal AI synthesis on the report's last page.
      # Empty URL disables it; the report still ships with imagery + charts.
      OLLAMA_BASE_URL:        ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL:           ${OLLAMA_MODEL:-llava}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-300}
      OLLAMA_MAX_TOKENS:      ${OLLAMA_MAX_TOKENS:-32000}
      # SMTP via Resend (or any relay). The API key is mounted as a
      # Docker secret, NOT injected via env, so it never appears in
      # `docker inspect` or compose's resolved config.
      SMTP_HOST:          ${SMTP_HOST:-smtp.resend.com}
      SMTP_PORT:          ${SMTP_PORT:-587}
      SMTP_USERNAME:      ${SMTP_USERNAME:-resend}
      SMTP_PASSWORD:      ${SMTP_PASSWORD:-}
      SMTP_PASSWORD_FILE: /run/secrets/resend_api_key
      SMTP_FROM_EMAIL:    ${SMTP_FROM_EMAIL:-noreply@aquagraph.org}
      SMTP_FROM_NAME:     ${SMTP_FROM_NAME:-AquaGraph}
      SMTP_USE_TLS:       ${SMTP_USE_TLS:-true}
    secrets:
      - resend_api_key
      - gee_service_account_key
    # No host port published on purpose: the app is NOT exposed on the VM's
    # public IP. The only ingress is the cloudflared tunnel below, which
    # reaches this container over the private compose network at app:5000.
    expose:
      - "5000"

  # Cloudflare Tunnel: makes an OUTBOUND connection to Cloudflare's edge and
  # forwards aquagraph.org traffic to http://app:5000. Nothing listens on the
  # VM's public IP, so the origin can't be hit directly, visitors can only
  # reach the site via https://aquagraph.org. The public-hostname → app:5000
  # mapping is configured in the Cloudflare Zero Trust dashboard (see
  # deploy/README.md §5); this container just runs the tunnel by token.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    depends_on:
      - app

  # Satellite-pass ingestion scheduler. Opt-in via the "ingest" profile so it
  # does NOT start by default - run it on a worker host:
  #   GEE_KEY_FILE=/abs/path/aquagraph-gee-key.json \
  #     docker compose -f docker-compose.prod.yml --profile ingest up -d --build ingest
  # Writes history to the same Postgres the app reads (DB-backed timeline /
  # charts / PDF update live; base-map tiles refresh on app restart).
  ingest:
    profiles: ["ingest"]
    build:
      context: .
      dockerfile: docker/Dockerfile.ingest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/aquagraph
      GEE_SERVICE_ACCOUNT_KEY: /secrets/gee-key.json
      GEE_PROJECT: ${GEE_PROJECT:-cassini2026}
      GEE_ASSET_RIVERS: ${GEE_ASSET_RIVERS:-projects/cassini2026/assets/eu-hydro}
      INGEST_SENSORS: ${INGEST_SENSORS:-S2,S1}
      INGEST_SCHEDULE_CRON: ${INGEST_SCHEDULE_CRON:-0 3 * * *}
      INGEST_FETCH_CHUNK: ${INGEST_FETCH_CHUNK:-250}
      INGEST_S1_BASELINE_START: ${INGEST_S1_BASELINE_START:-2023-06-01}
      INGEST_S1_BASELINE_END: ${INGEST_S1_BASELINE_END:-2023-08-31}
      INGEST_REBUILD_SNAPSHOT: ${INGEST_REBUILD_SNAPSHOT:-0}
    volumes:
      # Set GEE_KEY_FILE to the absolute SA key path when enabling --profile
      # ingest. The default keeps the normal (no-profile) VM deploy working;
      # if you enable the profile without setting it, the missing file makes
      # the failure obvious at `up` time.
      - ${GEE_KEY_FILE:-./aquagraph-gee-key.json}:/secrets/gee-key.json:ro

volumes:
  aquagraph-pgdata:

# Secrets are bind-mounted read-only into the containers that list them
# under `secrets:`. The host files live OUTSIDE the repo (never commit
# them). Set RESEND_KEY_FILE and GEE_KEY_FILE in the VM's .env to point
# at the real absolute paths.
secrets:
  resend_api_key:
    file: ${RESEND_KEY_FILE:-./resend_key}
  gee_service_account_key:
    file: ${GEE_KEY_FILE:-./aquagraph-gee-key.json}
